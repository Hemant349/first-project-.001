<!DOCTYPE html>
<html>
<head>
<title>Password Validator</title>

<style>
body{
    font-family: Arial;
    text-align: center;
    margin-top: 100px;
}

input{
    padding:10px;
    font-size:16px;
}

button{
    padding:10px 15px;
    margin-left:10px;
}

#result{
    margin-top:20px;
    font-size:18px;
}
</style>

</head>

<body>

<h2>Password Validation</h2>

<input type="password" id="password" placeholder="Enter Password">
<button id="checkBtn">Check Password</button>

<p id="result"></p>

<script>

let btn = document.getElementById("checkBtn")

btn.addEventListener("click", function(){

    let password = document.getElementById("password").value
    let result = document.getElementById("result")

    let pattern = /^(?=.*[A-Z])(?=.*[0-9]).{8,}$/

    if(pattern.test(password)){
        result.innerText = "Valid Password"
        result.style.color = "green"
    }
    else{
        result.innerText = "Password must contain 8 characters, 1 uppercase letter and 1 number"
        result.style.color = "red"
    }

})

</script>

</body>
</html>
