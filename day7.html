
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h2>Color Changer</h2>

    <button class="color-btn">black</button>
    <button class="color-btn">grey</button>
    <button class="color-btn">pink</button>
    <button class="color-btn">green</button>
    <button class="color-btn">blue</button>
</body>

<script>
    const buttons = document.querySelectorAll(".color-btn")
    console.log(buttons)

    buttons.forEach(function (btn) {

        btn.addEventListener("click", function (event) {

            const color = event.target.innerText.toLowerCase()

            document.body.style.backgroundColor = color

        })

    })
</script>

</html>
